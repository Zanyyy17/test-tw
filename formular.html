<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulář</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2 id="formular" class="mt-5">Posoudit vůni</h2>

<form class="perfume-form">

<label>Název vůně *</label>
<input type="text" required>

<label>Typ vůně</label>
<div>
<input type="radio" name="typ"> Květinová
<input type="radio" name="typ"> Ovocná
<input type="radio" name="typ"> Kořeněná
<input type="radio" name="typ"> Experimentální
</div>

<label>Datum vytvoření</label>
<input type="date">

<label>Intenzita</label>
<input type="range" min="0" max="100">

<label>Barva vůně</label>
<input type="color">

<label>Kód vzorku</label>
<input type="text" pattern="[A-Z]{2}-\d{3}[A-Z]">

<label>Obrázek vzorku</label>
<input type="file">

<label>Email</label>
<input type="email">

<label>Potvrzení emailu</label>
<input type="email">

<div class="buttons">
<button type="reset">Reset</button>
<button type="submit">Odeslat</button>
</div>

</form>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
